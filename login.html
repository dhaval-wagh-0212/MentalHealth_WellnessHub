<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wellness Hub Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 90% 15%, #f8faff 0%, #edf1fb 45%);
      color: #1f2937;
      padding: 20px;
    }
    .auth-card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border: 1px solid #d8dfec;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 18px 40px rgba(35, 49, 90, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 16px; color: #66748b; font-weight: 600; }
    .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .tab {
      border: 1px solid #cfd8ec;
      background: #fff;
      color: #32415a;
      border-radius: 10px;
      font-weight: 700;
      padding: 8px 12px;
      cursor: pointer;
    }
    .tab.active { background: #e8eeff; border-color: #b7c8ff; color: #3559d1; }
    label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    input {
      width: 100%;
      border: 1px solid #cfd8ec;
      border-radius: 10px;
      padding: 11px 12px;
      font-family: inherit;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    .hidden { display: none; }
    .action-btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: #0b1236;
      color: #fff;
      font-weight: 700;
      font-family: inherit;
      padding: 11px 12px;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #4a5b76;
    }
    .status.error { color: #b4234f; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h1>Wellness Hub</h1>
    <p>Login to continue. Use ID or username and password.</p>

    <div class="tabs">
      <button id="tab-login" class="tab active" type="button">Login</button>
      <button id="tab-register" class="tab" type="button">Register</button>
    </div>

    <form id="login-form">
      <label for="login-identifier">ID or Username</label>
      <input id="login-identifier" type="text" autocomplete="username" required>
      <label for="login-password">Password</label>
      <input id="login-password" type="password" autocomplete="current-password" required>
      <button class="action-btn" type="submit">Login</button>
    </form>

    <form id="register-form" class="hidden">
      <label for="register-userid">User ID</label>
      <input id="register-userid" type="text" autocomplete="username" required>
      <label for="register-username">Username</label>
      <input id="register-username" type="text" required>
      <label for="register-password">Password</label>
      <input id="register-password" type="password" autocomplete="new-password" required>
      <button class="action-btn" type="submit">Create Account</button>
    </form>

    <div id="auth-status" class="status"></div>
  </div>

  <script src="login.js?v=3"></script>
</body>
</html>
